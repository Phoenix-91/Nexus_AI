name: NEXUS.AI — Deploy Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:

  # ── Job 1: Test Frontend ──────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build
        env:
          VITE_API_URL: https://nexus-backend.onrender.com/api
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

  # ── Job 2: Test Backend ───────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --check src/server.js

  # ── Job 3: Test AI Service ────────────────────────────
  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax
        run: python -m py_compile app/main.py

  # ── Job 4: Deploy Frontend → Vercel ──────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          VITE_API_URL: https://nexus-backend.onrender.com/api
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  # ── Job 5: Deploy Backend → Render ───────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "✅ Backend deploy triggered"

  # ── Job 6: Deploy AI Service → Render ────────────────
  deploy-ai-service:
    name: Deploy AI Service → Render
    runs-on: ubuntu-latest
    needs: [test-ai-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_AI_SERVICE_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "✅ AI Service deploy triggered"

  # ── Job 7: Post-Deploy Health Check ──────────────────
  health-check:
    name: Verify All Services Live
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend, deploy-ai-service]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for services to boot
        run: sleep 60

      - name: Check Backend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://nexus-backend.onrender.com/api/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend health check failed!"
            exit 1
          fi
          echo "✅ Backend is healthy"

      - name: Check AI Service Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://nexus-ai-service.onrender.com/health)
          echo "AI Service status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ AI Service health check failed!"
            exit 1
          fi
          echo "✅ AI Service is healthy"

      - name: All services live
        run: echo "🚀 NEXUS.AI fully deployed and healthy!"
